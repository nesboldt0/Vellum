<!DOCTYPE html>
<html>
<!-- vellum IDE: charcoal clion setup -->
<head>
    <title>Vellum IDE</title>
    <style>
        /* ui basics and general layout */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; color: #a9b7c6;
        }

        h1 {
            font-weight: 800; font-size: 2.2rem; letter-spacing: 3px;
            color: #4b6eaf; margin-bottom: 10px; text-transform: uppercase;
        }

        /* main editor box and scroll stuff */
        .ide-container {
            display: flex; width: 95%; max-width: 900px; height: 480px;
            background: #2b2b2b; border: 1px solid #323232; border-radius: 4px;
            position: relative; overflow: hidden;
        }

        #line-numbers {
            width: 50px; background: #313335; color: #606366;
            padding: 20px 0; text-align: center; font-family: 'JetBrains Mono', monospace;
            font-size: 14px; line-height: 24px; border-right: 1px solid #323232;
            overflow: hidden; user-select: none;
        }

        .editor-wrapper { position: relative; flex-grow: 1; height: 100%; }

        /* getting the invisible input layer to line up with the highlight layer */
        #editor, #highlight-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; font-family: 'JetBrains Mono', monospace;
            font-size: 16px; line-height: 24px; white-space: pre;
            word-wrap: normal; box-sizing: border-box; margin: 0;
            overflow: auto;
        }

        #editor {
            background: transparent; color: transparent;
            caret-color: #ffffff; z-index: 2; border: none;
            outline: none; resize: none;
        }

        #highlight-layer { z-index: 1; color: #F8F8F2; pointer-events: none; overflow: hidden; }

        /* vellum syntax colors */
        .hl-var { color: #BD93F9; }
        .hl-func { color: #FFB86C; }
        .hl-print { color: #50FA7B; }
        .hl-comment { color: #6272A4; font-style: italic; }
        .hl-bracket { color: #FF6B6B; }
        .hl-num { color: #8BE9FD; }
        .hl-string { color: #F1FA8C; }
        .hl-logic { color: #FF79C6; }
        .hl-loop { color: #8BE9FD; }

        button {
            background: #4b6eaf; color: white; border: none;
            padding: 12px 30px; border-radius: 4px; cursor: pointer;
            font-weight: bold; margin: 20px 0;
        }

        #terminal {
            width: 95%; max-width: 900px; height: 150px;
            background: #1e1e1e; color: #f8fafc; padding: 15px;
            border: 1px solid #323232; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>VELLUM EDITOR</h1>
    <div class="ide-container">
        <div id="line-numbers">1</div>
        <div class="editor-wrapper">
            <div id="highlight-layer"></div>
            <textarea id="editor" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
        </div>
    </div>

    <button onclick="runVellum()">RUN CODE &#187;</button>

    <div id="terminal"></div>

    <script>
        const editor = document.getElementById('editor');
        const highlightLayer = document.getElementById('highlight-layer');
        const lineNumbers = document.getElementById('line-numbers');

        // keeping all layers locked on scroll
        function syncScroll() {
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
            lineNumbers.scrollTop = editor.scrollTop;
        }

        function handleInput() {
            updateHighlighter();
            updateLineNumbers();
            syncScroll();
        }

        // finding and coloring our vellum runes
        function updateHighlighter() {
            let code = editor.value;
            code = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            const comments = [];
            // pulling the ## comments out first so they dont get messed up by the regex
            code = code.replace(/(##.*)/g, (match) => {
                comments.push(match);
                return `__C${comments.length - 1}__`;
            });

            code = code.replace(/(['"])(.*?)\1/g, '<span class="hl-string">$1$2$1</span>');
            code = code.replace(/(![a-zA-Z0-9_]+)/g, '<span class="hl-var">$1</span>');
            code = code.replace(/(~[a-zA-Z0-9_]+)/g, '<span class="hl-func">$1</span>');
            code = code.replace(/(\?)/g, '<span class="hl-print">$1</span>');
            // logic highlighting for :: and ?&
            code = code.replace(/(\?&amp;|&amp;|::)/g, '<span class="hl-logic">$1</span>');
            code = code.replace(/(@)/g, '<span class="hl-loop">$1</span>');
            code = code.replace(/\b(\d+)\b/g, '<span class="hl-num">$1</span>');
            code = code.replace(/([{}])/g, '<span class="hl-bracket">$1</span>');

            // putting the comments back in with the right color
            comments.forEach((comment, index) => {
                code = code.replace(`__C${index}__`, `<span class="hl-comment">${comment}</span>`);
            });

            highlightLayer.innerHTML = code + (code.endsWith('\n') ? ' ' : '');
        }

        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        // translating the runes into actual js
        function runVellum() {
            const input = editor.value;
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = "";

            const lines = input.split('\n');
            let js_code = [];

            lines.forEach((line) => {
                // ignoring the comments so they dont run
                let cleanLine = line.split('##')[0].trim();
                if (!cleanLine) return;

                // doing variable assignment
                if (cleanLine.includes('->')) {
                    let [left, right] = cleanLine.split('->');
                    let varName = left.trim().replace('!', '');
                    js_code.push(`var ${varName} = ${right.trim()};`);
                }
                // setting up the for loop
                else if (cleanLine.startsWith('@')) {
                    let count = cleanLine.replace('@', '').split('{')[0].trim();
                    js_code.push(`for (let i = 0; i < ${count}; i++) {`);
                }
                // printing stuff to the terminal div
                else if (cleanLine.startsWith('?')) {
                    // special check to make sure it's not an else-if (?&)
                    if (!cleanLine.startsWith('?&')) {
                        let content = cleanLine.substring(1).trim();
                        js_code.push(`printToTerminal(${content});`);
                    } else {
                        let cond = cleanLine.substring(2).split('{')[0].trim();
                        js_code.push(`} else if (${cond}) {`);
                    }
                }
                // if statement logic
                else if (cleanLine.startsWith('&')) {
                    let cond = cleanLine.substring(1).split('{')[0].trim();
                    js_code.push(`if (${cond}) {`);
                }
                // else logic - uses implicit closure to avoid token errors
                else if (cleanLine.startsWith('::')) {
                    js_code.push('} else {');
                }
                // defining the function with {}
                else if (cleanLine.startsWith('~')) {
                    let fName = cleanLine.substring(1).split('{')[0].trim();
                    js_code.push(`function ${fName}() {`);
                }
                // closing braces
                else if (cleanLine === '}') {
                    js_code.push('}');
                }
                // handle return statements or direct function calls
                else {
                    let translated = cleanLine.replace(/!/g, '');
                    js_code.push(translated + (translated.endsWith('{') || translated.endsWith('}') || translated.endsWith(';') ? '' : ';'));
                }
            });

            // running the code as one long string
            try {
                window.printToTerminal = (data) => {
                    terminal.innerHTML += "> " + data + "<br>";
                    terminal.scrollTop = terminal.scrollHeight;
                };
                eval(js_code.join(' '));
            } catch (err) {
                terminal.innerHTML += "<span style='color:#FF6B6B;'>ERROR: " + err.message + "</span>";
            }
        }

        handleInput();
    </script>
</body>
</html>
